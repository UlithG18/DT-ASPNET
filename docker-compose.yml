services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: dtaspnet
      POSTGRES_USER: dtuser
      POSTGRES_PASSWORD: dtpass123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtuser -d dtaspnet"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: Api
        PORT: 8081
    ports: ["8081:8081"]
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=dtaspnet;Username=dtuser;Password=dtpass123"
      Jwt__Secret: ""
      OpenAI__ApiKey: ""
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: Web
        PORT: 8082
    ports: ["8082:8082"]
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=dtaspnet;Username=dtuser;Password=dtpass123"
      Jwt__Secret: ""
      OpenAI__ApiKey: ""
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: